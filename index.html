<!DOCTYPE html>
<html lang="ko" data-theme="classic">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>타로 · Universal Waite — 커버플로우 리딩</title>
  <meta name="description" content="유니버설 웨이트(RWS) 타로 78장을 커버플로우로 넘겨 보고, 장 수를 골라 그 자리에서 뽑아 3000단어 해석을 읽는 웹앱." />
  <link rel="preconnect" href="https://commons.wikimedia.org" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="classic">
  <!-- ===== 상단 ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">✦</span>
      <div>
        <h1>Arcana Flow</h1>
        <p class="brand-sub">유니버설 웨이트 · 커버플로우 리딩</p>
      </div>
    </div>
    <div class="theme-picker" id="themePicker" aria-label="카드 테마 선택">
      <!-- 테마 칩이 JS로 채워진다 -->
    </div>
  </header>

  <main>
    <!-- ===== 커버플로우 ===== -->
    <section class="flow-section" aria-label="덱 둘러보기">
      <div class="flow-stage" id="flowStage">
        <div class="flow-track" id="flowTrack"><!-- 카드가 JS로 렌더 --></div>
      </div>
      <div class="flow-nav">
        <button class="ghost-btn" id="flowPrev" aria-label="이전 카드">‹</button>
        <div class="flow-meta" id="flowMeta">—</div>
        <button class="ghost-btn" id="flowNext" aria-label="다음 카드">›</button>
      </div>
      <input type="range" id="flowRange" class="flow-range" min="0" max="77" value="0" aria-label="덱 스크럽" />
    </section>

    <!-- ===== 추첨 컨트롤 ===== -->
    <section class="draw-panel">
      <div class="draw-row">
        <div class="field">
          <label>스프레드 / 장 수</label>
          <div class="count-chips" id="countChips"></div>
        </div>
        <div class="field grow">
          <label>나만의 시드 (선택) — 같은 시드 = 같은 결과</label>
          <input type="text" id="seedInput" class="seed-input" placeholder="비워 두면 '뽑는 순간'의 밀리초로 자동 생성" />
        </div>
        <button class="primary-btn" id="drawBtn">카드 뽑기</button>
      </div>
      <p class="draw-hint" id="drawHint">버튼을 누른 정확한 밀리초가 시드가 됩니다. 클릭 타이밍의 미세한 차이가 전혀 다른 운명으로 갈라집니다.</p>
    </section>

    <!-- ===== 추첨 결과 + 해석 ===== -->
    <section class="results" id="results" aria-live="polite"></section>

    <!-- ===== 아카이브 ===== -->
    <section class="archive-section">
      <div class="archive-head">
        <h2>뽑았던 카드 · 아카이브</h2>
        <div class="archive-actions">
          <button class="ghost-btn sm" id="archiveToggle">펼치기</button>
          <button class="ghost-btn sm danger" id="archiveClear">전체 삭제</button>
        </div>
      </div>
      <div class="archive-list" id="archiveList" hidden></div>
    </section>
  </main>

  <footer class="sitefoot">
    <p>카드 이미지: Pamela Colman Smith / Rider–Waite–Smith (1909), 퍼블릭 도메인 · Wikimedia Commons.</p>
    <p class="disclaimer">합성 해석 / synthetic interpretation. 오락·성찰 목적이며, 의학·법률·재정적 조언이 아닙니다.</p>
  </footer>

  <!-- 카드 상세 해석 모달은 결과 영역 인라인으로 펼쳐집니다 -->
  <script src="js/rng.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/lexicon.js"></script>
  <script src="js/reading.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
